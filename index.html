<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<title>Gender Reveal</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Great+Vibes&family=Ms+Madi&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:Arial}

/* ===== ЭКРАН 1: Girl or Boy ===== */
.screen1{
  position:relative;
  height:100vh;
  width:100%;
  overflow:hidden;
  background:#000;
}
.screen1 video{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:cover;
}
.screen1 .overlay{
  position:absolute;
  inset:0;
  background:rgba(0,0,0,.35);
}
.screen1 .star{
  position:absolute;
  width:20px;
  height:20px;
}
.screen1 .star svg{
  width:100%;
  height:100%;
}
.screen1 .title{
  position:absolute;
  left:50%;
  bottom:25%;
  transform:translateX(-50%) rotate(-9deg);
  font-family:'Ms Madi',cursive;
  font-size:clamp(72px,10vw,140px);
  color:#fff;
  white-space:nowrap;
  text-shadow:0 0 8px rgba(255,255,255,.15);
  font-weight:100;
  letter-spacing:6px;
  -webkit-text-stroke:0.5px white;
}
.screen1 .arrow{
  position:absolute;
  left:50%;
  bottom:25px;
  transform:translateX(-50%);
  animation:b 1.8s infinite;
  cursor:pointer;
  text-decoration:none;
}
.screen1 .arrow svg{
  width:28px;
  height:28px;
  display:block;
}
@keyframes b{
  0%,100%{transform:translateX(-50%) translateY(0)}
  50%{transform:translateX(-50%) translateY(8px)}
}

/* ===== ЭКРАН 2: Приглашение ===== */
.screen2{
  min-height:100vh;
  width:100%;
  background: linear-gradient(90deg, #ffcbe7 0%, #dff8ff 50%, #fff3fa 100%);
  background-size: 300% 100%;
  animation: bgSlide 10s ease-in-out infinite;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
  padding: clamp(20px, 4vw, 40px) clamp(12px, 2.5vw, 20px);
  justify-content: center;
  gap: clamp(18px, 3.5vw, 40px);
  overflow:hidden;
}
@keyframes bgSlide {
  0%{background-position:100% 0}
  50%{background-position:0% 0}
  100%{background-position:100% 0}
}

/* Анимация появления при прокрутке */
.screen2 .title,
.screen2 .info,
.screen2 .calendar-wrapper,
.screen2 .bottom{
  opacity: 0;
  transform: translateY(30px);
  transition: opacity 0.8s ease, transform 0.8s ease;
}
.screen2.visible .title{
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0.1s;
}
.screen2.visible .info{
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0.3s;
}
.screen2.visible .calendar-wrapper{
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0.5s;
}
.screen2.visible .bottom{
  opacity: 1;
  transform: translateY(0);
  transition-delay: 0.7s;
}

.screen2 .title{
  font-family:'Great Vibes', cursive;
  font-size: clamp(42px, 9vw, 72px);
  font-weight:400;
  line-height:1.1;
  word-break: break-word;
  color:#111;
}
.screen2 .info{
  font-family:'Cormorant Garamond';
  font-size: clamp(20px, 4vw, 32px);
  line-height:1.45;
  padding: 0 10px;
  color:#111;
}
.screen2 .calendar-wrapper{
  width:100%;
  max-width:620px;
  flex-shrink: 0;
}
.screen2 .month-title{
  display:flex;
  align-items:center;
  gap: clamp(12px, 3vw, 25px);
  justify-content:center;
  font-family:'Cormorant Garamond';
  font-size: clamp(32px, 7vw, 52px);
  color:#111;
}
.screen2 .month-title:before,
.screen2 .month-title:after{
  content:"";
  height:1px;
  background:#777;
  flex:1;
}
.screen2 .calendar{
  position:relative;
  margin-top: clamp(10px, 2vw, 15px);
  height: clamp(160px, 30vw, 240px);
  border-top:1px solid #777;
  border-bottom:1px solid #777;
}
.screen2 .days{
  height:100%;
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
}
.screen2 .cell{
  border-right:1px solid #777;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Cormorant Garamond';
  padding: clamp(5px, 2vw, 10px);
}
.screen2 .cell:last-child{
  border:none;
}
.screen2 .week{
  font-size: clamp(16px, 3.5vw, 28px);
  margin-bottom: clamp(10px, 2.5vw, 25px);
  word-break: break-word;
  color:#111;
}
.screen2 .number{
  font-size: clamp(48px, 10vw, 90px);
  color: #bbb;
}
.screen2 .middle .number{
  color:#000;
  font-size: clamp(65px, 14vw, 130px);
  line-height:1;
}

/* Обводка */
.screen2 .circle-wrapper{
  position:absolute;
  width: clamp(160px, 30vw, 250px);
  height: clamp(160px, 30vw, 250px);
  left:50%;
  top: clamp(5px, 2vw, 15px);
  transform:translateX(-50%);
  pointer-events: none;
}

.screen2 .circle-wrapper svg{
  width:100%;
  height:100%;
  overflow:visible;
  animation: breathe 3s ease-in-out infinite;
  transform-origin: center center;
}

@keyframes breathe {
  0%,100%{
    transform: scale(1);
  }
  50%{
    transform: scale(1.08);
  }
}

.screen2 .bottom{
  font-family:'Cormorant Garamond';
  font-size: clamp(20px, 4vw, 32px);
  line-height:1.5;
  padding: 0 10px;
  color:#111;
}
</style>
</head>
<body>

<!-- ===== ЭКРАН 1 ===== -->
<div class="screen1">
  <video autoplay loop muted playsinline>
    <source src="видео.mp4" type="video/mp4"/>
  </video>
  <div class="overlay"></div>

  <div class="star" style="left:3%;top:4%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:92%;top:6%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:82%;top:20%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:5%;top:38%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:90%;top:36%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:18%;top:8%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:78%;top:10%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:2%;top:60%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:94%;top:56%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:10%;top:75%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:88%;top:72%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:6%;top:88%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:86%;top:90%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:30%;top:90%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>
  <div class="star" style="left:70%;top:88%"><svg viewbox="0 0 24 24"><path d="M12 2l2.3 7.2L22 12l-7.7 2.8L12 22l-2.3-7.2L2 12l7.7-2.8z" fill="none" stroke="white" stroke-width="1"></path></svg></div>

  <h1 class="title">Girl or Boy</h1>
  <a href="#screen2" class="arrow">
    <svg viewbox="0 0 24 24" fill="none">
      <path d="M6 10l6 6 6-6" stroke="white" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </a>
</div>

<!-- ===== ЭКРАН 2 ===== -->
<div class="screen2" id="screen2">

  <div class="title">Дорогие и любимые!</div>

  <div class="info">
    Приглашаем Вас на наше трепетное и<br>
    семейное торжество! Произойдет<br>
    очень важное и волнительное событие!
  </div>

  <div class="calendar-wrapper">
    <div class="month-title">АВГУСТ</div>
    <div class="calendar">
      <div class="days">
        <div class="cell">
          <div class="week">ПЯТНИЦА</div>
          <div class="number">28</div>
        </div>
        <div class="cell middle">
          <div class="week">СУББОТА</div>
          <div class="number">29</div>
        </div>
        <div class="cell">
          <div class="week">ВОСКРЕСЕНЬЕ</div>
          <div class="number">30</div>
        </div>
      </div>

      <!-- Обводка: 4 слоя, цвета переплетаются -->
      <div class="circle-wrapper">
        <svg viewBox="0 0 200 200">
          <!-- Слой 1: внешний — целый эллипс голубой -->
          <ellipse cx="100" cy="100" rx="96" ry="96"
            fill="none" stroke="#00a9d8" stroke-width="2"
            stroke-linecap="round" opacity="0.9"/>

          <!-- Слой 2: розовый, слегка смещён и повёрнут -->
          <ellipse cx="100" cy="100" rx="90" ry="90"
            fill="none" stroke="#df5aa5" stroke-width="2.5"
            stroke-linecap="round" opacity="0.85"
            transform="rotate(5, 100, 100)"/>

          <!-- Слой 3: голубой пунктирный -->
          <ellipse cx="100" cy="100" rx="82" ry="82"
            fill="none" stroke="#00a9d8" stroke-width="1.8"
            stroke-dasharray="30 6 15 4 50 5 20 4"
            stroke-linecap="round" opacity="0.7"
            transform="rotate(-8, 100, 100)"/>

          <!-- Слой 4: розовый пунктирный -->
          <ellipse cx="100" cy="100" rx="74" ry="74"
            fill="none" stroke="#df5aa5" stroke-width="1.5"
            stroke-dasharray="25 5 40 7 18 3 35 6"
            stroke-linecap="round" opacity="0.6"
            transform="rotate(12, 100, 100)"/>

          <!-- Слой 5: внутренний — голубой тонкий -->
          <ellipse cx="100" cy="100" rx="66" ry="66"
            fill="none" stroke="#00a9d8" stroke-width="1"
            stroke-linecap="round" opacity="0.5"
            transform="rotate(-3, 100, 100)"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="bottom">
    Мы узнаем пол нашего малыша<br>
    и хотим разделить это счастье с Вами!
  </div>

</div>

<script>
const screen2 = document.getElementById('screen2');
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      screen2.classList.add('visible');
    }
  });
}, { threshold: 0.3 });
observer.observe(screen2);
</script>

</body>
</html>
